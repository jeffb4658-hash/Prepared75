name: Prepared75 Daily Video

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  post_video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests gtts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Run Prepared75 video pipeline
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          SHOTSTACK_API_KEY:      ${{ secrets.SHOTSTACK_API_KEY }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python pipeline.py
